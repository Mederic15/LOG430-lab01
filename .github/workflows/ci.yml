name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout dépot
        uses: actions/checkout@v4

      - name: Créer fichier .env (TODO - utilisez les secrets)
        run: |
          echo "MYSQL_HOST=mysql" >> .env
          echo "MONGODB_HOST=mongo" >> .env
          echo "MONGO_URI=mongodb://mongo:27017" >> .env
          echo "MYSQL_DB_NAME=labo01_db" >> .env
          echo "DB_USERNAME=labo01" >> .env
          echo "DB_PASSWORD=labo01" >> .env

      - name: Démarrer le conteneur
        run: |
          docker network inspect labo01-network >/dev/null 2>&1 || docker network create labo01-network
          docker-compose up -d

      - name: Attendre MongoDB
        run: |
          timeout=60
          until docker exec mongo mongosh -u labo01 -p labo01 --authenticationDatabase admin --eval "db.runCommand({ ping: 1 })" >/dev/null 2>&1; do
            echo "Waiting for MongoDB..."
            sleep 3
            timeout=$((timeout - 3))
            if [ $timeout -le 0 ]; then
              echo "MongoDB failed to start"
              exit 1
            fi
          done

      - name: Seed MongoDB
        run: |
          docker exec mongo mongosh -u labo01 -p labo01 --authenticationDatabase admin log430_lab01 --eval '
            db.users.insertMany([
              { name: "User1", email: "u1@test.com" },
              { name: "User2", email: "u2@test.com" },
              { name: "User3", email: "u3@test.com" }
            ]);

            db.products.insertMany([
              { name: "P1", brand: "B1", price: 10 },
              { name: "P2", brand: "B2", price: 20 },
              { name: "P3", brand: "B3", price: 30 }
            ]);
          '

      - name: Attendre MySQL
        run: |
          sleep 10
          timeout=60
          until docker exec mysql mysqladmin ping -h localhost -u root -proot --silent; do
            echo "Waiting for MySQL..."
            sleep 3
            timeout=$((timeout - 3))
            if [ $timeout -le 0 ]; then
              echo "MySQL failed to start"
              exit 1
            fi
          done
          sleep 5

      - name: Éxécuter les tests (TODO - ajouter test_products)
        run: docker exec store_manager_cli pytest ./src/tests

      - name: Cleanup
        if: always()
        run: docker-compose down -v